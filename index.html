<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelance CRM - Calendario de Visitas</title>
  <!-- Supabase CDN JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #1e293b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e2e8f0;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; line-height: 1.5; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #0f172a; }
    
    button { background-color: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: var(--radius); cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: background 0.2s; }
    button:hover { background-color: var(--primary-hover); }
    button.secondary { background-color: transparent; border: 1px solid var(--border); color: var(--text-color); }
    button.secondary:hover { background: #f1f5f9; }
    
    /* Filtros y Cabecera de Calendario */
    .controls-card { background: var(--card-bg); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .filter-group { display: flex; gap: 12px; flex-wrap: wrap; flex: 1; }
    .nav-calendar { display: flex; align-items: center; gap: 8px; }
    .nav-calendar h2 { font-size: 1.1rem; font-weight: 600; min-width: 160px; text-align: center; }
    select, input, textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; color: var(--text-color); outline: none; background: #fff; }
    select:focus, input:focus, textarea:focus { border-color: var(--primary); }

    /* Estructura del Calendario */
    .calendar-container { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #f1f5f9; text-align: center; font-weight: 600; color: #475569; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    .weekday { padding: 10px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(100px, auto); }
    
    /* Celdas del Día */
    .calendar-day { background: #fff; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; display: flex; flex-direction: column; gap: 4px; position: relative; }
    .calendar-day:nth-child(7n) { border-right: none; }
    .day-number { font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 4px; display: inline-block; width: 22px; height: 22px; text-align: center; line-height: 22px; }
    .day-today { background: #2563eb; color: #fff; border-radius: 50%; }
    .day-other-month { background: #f8fafc; opacity: 0.5; }
    
    /* Tarjetas de Evento / Lead dentro del día */
    .event-item { background: #e0f2fe; color: #0369a1; padding: 4px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border-left: 3px solid #0284c7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: transform 0.1s; }
    .event-item:hover { transform: scale(1.02); background: #bae6fd; }
    
    /* Badges de Estado adaptados para el calendario */
    .event-por-contactar { background: #fee2e2; color: #991b1b; border-left-color: #ef4444; }
    .event-contactado { background: #e0f2fe; color: #0369a1; border-left-color: #3b82f6; }
    .event-interesado { background: #fef9c3; color: #854d0e; border-left-color: #eab308; }
    .event-en-seguimiento { background: #f3e8ff; color: #6b21a8; border-left-color: #a855f7; }
    .event-cliente { background: #dcfce7; color: #166534; border-left-color: #22c55e; }
    .event-descartado { background: #f1f5f9; color: #475569; border-left-color: #94a3b8; }

    /* Modales */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 10; padding: 16px; }
    .modal-content { background: var(--card-bg); padding: 24px; border-radius: var(--radius); width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    
    /* Historial de Notas */
    .notes-history { margin-top: 16px; max-height: 150px; overflow-y: auto; background: #f8fafc; padding: 10px; border-radius: var(--radius); border: 1px solid var(--border); }
    .note-item { font-size: 0.8rem; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
    .note-item:last-child { margin-bottom: 0; padding-bottom: 0; border: none; }
    .note-date { font-weight: bold; color: #64748b; }

    /* Adaptación Mobile */
    @media (max-width: 768px) {
      .controls-card { flex-direction: column; align-items: stretch; }
      .calendar-weekdays { display: none; }
      .calendar-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
      .calendar-day { border-right: none; padding: 10px; min-height: auto !important; }
      .calendar-day:not(:has(.event-item)) { display: none; } /* En móvil oculta días vacíos para ahorrar espacio */
      .day-number { display: block; width: auto; height: auto; background: #f1f5f9; padding: 4px; border-radius: 4px; text-align: left; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Agenda de Clientes Potenciales</h1>
      <button onclick="openModal('add')">+ Nuevo Lead</button>
    </header>

    <!-- Filtros y Navegación del Calendario -->
    <section class="controls-card">
      <div class="filter-group">
        <select id="filter-estado" onchange="fetchLeads()">
          <option value="">Todos los Estados</option>
          <option value="Por contactar">Por contactar</option>
          <option value="Contactado">Contactado</option>
          <option value="Interesado">Interesado</option>
          <option value="En seguimiento">En seguimiento</option>
          <option value="Cliente">Cliente</option>
          <option value="Descartado">Descartado</option>
        </select>
        <select id="filter-rubro" onchange="fetchLeads()">
          <option value="">Todos los Rubros</option>
          <option value="Colegio">Colegio</option>
          <option value="Agrícola">Agrícola</option>
          <option value="Transporte">Transporte</option>
          <option value="Comercio">Comercio</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      
      <div class="nav-calendar">
        <button class="secondary" onclick="changeMonth(-1)">◀ Anterior</button>
        <h2 id="calendar-month-year">Mes Año</h2>
        <button class="secondary" onclick="changeMonth(1)">Siguiente ▶</button>
      </div>
    </section>

    <!-- Contenedor del Calendario -->
    <main class="calendar-container">
      <div class="calendar-weekdays">
        <div class="weekday">Lun</div>
        <div class="weekday">Mar</div>
        <div class="weekday">Mié</div>
        <div class="weekday">Jue</div>
        <div class="weekday">Vie</div>
        <div class="weekday">Sáb</div>
        <div class="weekday">Dom</div>
      </div>
      <div id="calendar-grid" class="calendar-grid">
        <!-- Generación dinámica de días y clientes aquí -->
      </div>
    </main>
  </div>

  <!-- MODAL FORMULARIO (Agregar / Editar) -->
  <div id="lead-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Nuevo Lead</h3>
        <button onclick="closeModal()" class="secondary" style="padding: 4px 8px;">✕</button>
      </div>
      <form id="lead-form">
        <input type="hidden" id="lead-id">
        
        <div class="form-row">
          <div class="form-group">
            <label for="nombre_empresa">Empresa *</label>
            <input type="text" id="nombre_empresa" required>
          </div>
          <div class="form-group">
            <label for="rubro">Rubro *</label>
            <select id="rubro" required>
              <option value="Colegio">Colegio</option>
              <option value="Agrícola">Agrícola</option>
              <option value="Transporte">Transporte</option>
              <option value="Comercio">Comercio</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="contacto_director">Contacto / Director</label>
            <input type="text" id="contacto_director">
          </div>
          <div class="form-group">
            <label for="estado">Estado *</label>
            <select id="estado" required>
              <option value="Por contactar">Por contactar</option>
              <option value="Contactado">Contactado</option>
              <option value="Interesado">Interesado</option>
              <option value="En seguimiento">En seguimiento</option>
              <option value="Cliente">Cliente</option>
              <option value="Descartado">Descartado</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email">
          </div>
        </div>

        <div class="form-group">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion">
        </div>

        <hr style="margin: 16px 0; border: 0; border-top: 1px solid var(--border);">

        <div class="form-row">
          <div class="form-group">
            <label for="proximo_paso">Próximo Paso / Tarea</label>
            <input type="text" id="proximo_paso" placeholder="Ej: Visita técnica o llamar">
          </div>
          <div class="form-group">
            <label for="fecha_seguimiento">Fecha Planificada</label>
            <input type="date" id="fecha_seguimiento">
          </div>
        </div>

        <div class="form-group">
          <label for="nueva_nota">Añadir nueva nota de visita/llamada</label>
          <textarea id="nueva_nota" rows="2" placeholder="Escribe aquí los detalles del contacto actual..."></textarea>
        </div>

        <!-- Historial de Notas visible solo al editar -->
        <div id="history-container" style="display:none;">
          <label>Historial de notas:</label>
          <div id="notes-list" class="notes-history"></div>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
          <button type="button" class="secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit">Guardar Lead</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = "https://lgdjaneabvygmwcniooe.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZGphbmVhYnZ5Z213Y25pb29lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTc5ODMsImV4cCI6MjA5ODMzMzk4M30.9eOXa9Cy4tGwFmtjhQaPmX-feU5RyUs2f2nbAMXK_Zc";
    
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allLeadsCache = [];
    
    // Estado de navegación del calendario (Inicia en el mes actual)
    let currentDate = new Date();

    // Formatear estado para CSS
    const formatClass = (str) => 'event-' + str.toLowerCase().replace(/ /g, '-');

    // Cargar datos de Supabase
    async function fetchLeads() {
      const filterEstado = document.getElementById('filter-estado').value;
      const filterRubro = document.getElementById('filter-rubro').value;

      let query = db.from('clientes_potenciales').select('*');

      if (filterEstado) query = query.eq('estado', filterEstado);
      if (filterRubro) query = query.eq('rubro', filterRubro);

      const { data, error } = await query;

      if (error) {
        console.error("Error cargando datos:", error);
        alert("Ocurrió un error al traer la información.");
        return;
      }

      allLeadsCache = data;
      renderCalendar();
    }

    // Cambiar de mes mediante las flechas
    function changeMonth(direction) {
      currentDate.setMonth(currentDate.getMonth() + direction);
      renderCalendar();
    }

    // Dibujar el Calendario Completo
    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const label = document.getElementById('calendar-month-year');
      grid.innerHTML = '';

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // Cabecera de mes actual
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      label.innerText = `${meses[month]} ${year}`;

      // Primer día del mes y total de días
      const firstDayOfMonth = new Date(year, month, 1);
      // Mapear el día de la semana para que Lunes sea 0 y Domingo sea 6
      let startDayOfWeek = firstDayOfMonth.getDay() - 1;
      if (startDayOfWeek === -1) startDayOfWeek = 6; 

      const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
      const totalDaysInPrevMonth = new Date(year, month, 0).getDate();

      const hoy = new Date();

      // 1. Dibujar días del mes anterior (Relleno inicial)
      for (let i = startDayOfWeek - 1; i >= 0; i--) {
        const dayNum = totalDaysInPrevMonth - i;
        createDayCell(grid, dayNum, true, false, null);
      }

      // 2. Dibujar días del mes actual
      for (let day = 1; day <= totalDaysInMonth; day++) {
        const isToday = (day === hoy.getDate() && month === hoy.getMonth() && year === hoy.getFullYear());
        // Formato de fecha string local YYYY-MM-DD para comparar con la base de datos
        const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        createDayCell(grid, day, false, isToday, dateString);
      }

      // 3. Dibujar días del mes siguiente (Relleno final para cuadrar la grilla de 7 columnas)
      const totalCellsFilled = startDayOfWeek + totalDaysInMonth;
      const remainingCells = totalCellsFilled % 7 === 0 ? 0 : 7 - (totalCellsFilled % 7);
      for (let day = 1; day <= remainingCells; day++) {
        createDayCell(grid, day, true, false, null);
      }
    }

    // Crear la celda individual del día e inyectar sus clientes asignados
    function createDayCell(container, dayNumber, isOtherMonth, isToday, dateString) {
      const cell = document.createElement('div');
      cell.className = 'calendar-day';
      if (isOtherMonth) cell.classList.add('day-other-month');

      // Número identificador del día
      const numSpan = document.createElement('span');
      numSpan.className = 'day-number';
      numSpan.innerText = dayNumber;
      if (isToday) numSpan.classList.add('day-today');
      cell.appendChild(numSpan);

      // Si pertenece al mes activo, buscar y meter los leads que caen en este día
      if (dateString) {
        const dayLeads = allLeadsCache.filter(lead => lead.fecha_seguimiento === dateString);
        
        dayLeads.forEach(lead => {
          const item = document.createElement('div');
          item.className = `event-item ${formatClass(lead.estado)}`;
          // Muestra el nombre de la empresa y la tarea que te toca hacer entre paréntesis
          const tarea = lead.proximo_paso ? `: ${lead.proximo_paso}` : '';
          item.innerText = `${lead.nombre_empresa}${tarea}`;
          item.title = `${lead.nombre_empresa} (${lead.estado})\nTarea: ${lead.proximo_paso || 'No definida'}`;
          
          // Al hacer clic abre la ficha de edición directamente
          item.onclick = (e) => {
            e.stopPropagation(); // Evita conflictos con el clic de la celda
            openModal('edit', lead.id);
          };
          cell.appendChild(item);
        });
      }

      container.appendChild(cell);
    }

    // Abrir ventana modal (Mismo flujo que tenías)
    function openModal(mode, id = null) {
      const modal = document.getElementById('lead-modal');
      const form = document.getElementById('lead-form');
      form.reset();
      document.getElementById('lead-id').value = '';
      document.getElementById('history-container').style.display = 'none';
      
      if (mode === 'add') {
        document.getElementById('modal-title').innerText = 'Nuevo Cliente Potencial';
      } else if (mode === 'edit') {
        document.getElementById('modal-title').innerText = 'Editar Cliente Potencial';
        document.getElementById('history-container').style.display = 'block';
        
        const lead = allLeadsCache.find(l => l.id === id);
        if (lead) {
          document.getElementById('lead-id').value = lead.id;
          document.getElementById('nombre_empresa').value = lead.nombre_empresa;
          document.getElementById('rubro').value = lead.rubro;
          document.getElementById('contacto_director').value = lead.contacto_director || '';
          document.getElementById('estado').value = lead.estado;
          document.getElementById('telefono').value = lead.telefono || '';
          document.getElementById('email').value = lead.email || '';
          document.getElementById('direccion').value = lead.direccion || '';
          document.getElementById('proximo_paso').value = lead.proximo_paso || '';
          document.getElementById('fecha_seguimiento').value = lead.fecha_seguimiento || '';
          
          // Renderizar historial de notas
          const notesList = document.getElementById('notes-list');
          notesList.innerHTML = '';
          const notes = lead.notas || [];
          if (notes.length === 0) {
            notesList.innerHTML = '<p style="font-size:0.8rem; color:#64748b">No hay notas previas.</p>';
          } else {
            [...notes].reverse().forEach(n => {
              notesList.innerHTML += `
                <div class="note-item">
                  <span class="note-date">${new Date(n.date).toLocaleDateString('es-ES')}:</span> ${n.text}
                </div>
              `;
            });
          }
        }
      }
      modal.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('lead-modal').style.display = 'none';
    }

    // Guardar o Actualizar Datos
    document.getElementById('lead-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('lead-id').value;
      const nombre_empresa = document.getElementById('nombre_empresa').value;
      const rubro = document.getElementById('rubro').value;
      const contacto_director = document.getElementById('contacto_director').value;
      const estado = document.getElementById('estado').value;
      const telefono = document.getElementById('telefono').value;
      const email = document.getElementById('email').value;
      const direccion = document.getElementById('direccion').value;
      const proximo_paso = document.getElementById('proximo_paso').value;
      const fecha_seguimiento = document.getElementById('fecha_seguimiento').value || null;
      const nuevaNotaText = document.getElementById('nueva_nota').value.trim();

      let payload = {
        nombre_empresa, rubro, contacto_director, estado, telefono, email, direccion, proximo_paso, fecha_seguimiento
      };

      if (!id) {
        if (nuevaNotaText) {
          payload.notas = [{ date: new Date().toISOString(), text: nuevaNotaText }];
        } else {
          payload.notas = [];
        }

        const { error } = await db.from('clientes_potenciales').insert([payload]);
        if (error) console.error(error);
      } else {
        const currentLead = allLeadsCache.find(l => l.id === id);
        let updatedNotes = currentLead.notas || [];
        
        if (nuevaNotaText) {
          updatedNotes.push({ date: new Date().toISOString(), text: nuevaNotaText });
        }
        payload.notas = updatedNotes;

        const { error } = await db.from('clientes_potenciales').update(payload).eq('id', id);
        if (error) console.error(error);
      }

      closeModal();
      fetchLeads();
    });

    // Iniciar la app cargando los leads en el calendario
    fetchLeads();
  </script>
</body>
</html>
